name: Trading Bot v4

on:
  schedule:
    - cron: "30 13 * * 1-5"
    - cron: "45 13 * * 1-5"
    - cron: "0  14 * * 1-5"
    - cron: "15 14 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "45 14 * * 1-5"
    - cron: "0  15 * * 1-5"
    - cron: "15 15 * * 1-5"
    - cron: "30 15 * * 1-5"
    - cron: "45 15 * * 1-5"
    - cron: "0  16 * * 1-5"
    - cron: "15 16 * * 1-5"
    - cron: "30 16 * * 1-5"
    - cron: "45 16 * * 1-5"
    - cron: "0  17 * * 1-5"
    - cron: "15 17 * * 1-5"
    - cron: "30 17 * * 1-5"
    - cron: "45 17 * * 1-5"
    - cron: "0  18 * * 1-5"
    - cron: "15 18 * * 1-5"
    - cron: "30 18 * * 1-5"
    - cron: "45 18 * * 1-5"
    - cron: "0  19 * * 1-5"
    - cron: "15 19 * * 1-5"
    - cron: "30 19 * * 1-5"

  workflow_dispatch:
    inputs:
      mode:
        description: "Trading mode"
        required: true
        default: "paper"
        type: choice
        options: [paper, live]
      capital_limit:
        description: "Max capital to use (USD)"
        required: true
        default: "1000"
      live_confirm:
        description: "LIVE only — type exactly: confirm"
        required: false
        default: ""

# Need write permission to commit trade_records.json back to repo
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          # Use PAT so the commit push is allowed
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run bot
        env:
          PAPER_MODE:    ${{ github.event.inputs.mode == 'live' && 'false' || 'true' }}
          CAPITAL_LIMIT: ${{ github.event.inputs.capital_limit || '0' }}
          LIVE_CONFIRM:  ${{ github.event.inputs.live_confirm || '' }}

          ALPACA_PAPER_API_KEY:    ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
          ALPACA_LIVE_API_KEY:     ${{ secrets.ALPACA_LIVE_API_KEY }}
          ALPACA_LIVE_API_SECRET:  ${{ secrets.ALPACA_LIVE_API_SECRET }}

          GIST_TOKEN:       ${{ secrets.GIST_TOKEN }}
          GIST_ID:          ${{ secrets.GIST_ID }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:    ${{ github.run_id }}

        run: python bot.py

      # Commit trade_records.json back to repo so dashboard can read it without any token
      - name: Commit trade records to repo
        if: always()
        run: |
          git config user.name  "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add trade_records.json || true
          if git diff --staged --quiet; then
            echo "No changes to trade_records.json — skipping commit"
          else
            git commit -m "bot: update trade records [skip ci]"
            git push origin main
          fi

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: trade-log-${{ github.run_id }}
          path: strategy_log.txt
          retention-days: 30
          if-no-files-found: ignore
