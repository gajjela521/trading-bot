name: VWAP EMA RSI Trading Bot

on:
  schedule:
    # Every 15 min, Mon–Fri market hours (UTC, summer EDT = UTC-4)
    # Bot's own timing guard rejects weekends and out-of-window runs
    - cron: "30 13 * * 1-5"
    - cron: "45 13 * * 1-5"
    - cron: "0  14 * * 1-5"
    - cron: "15 14 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "45 14 * * 1-5"
    - cron: "0  15 * * 1-5"
    - cron: "15 15 * * 1-5"
    - cron: "30 15 * * 1-5"
    - cron: "45 15 * * 1-5"
    - cron: "0  16 * * 1-5"
    - cron: "15 16 * * 1-5"
    - cron: "30 16 * * 1-5"
    - cron: "45 16 * * 1-5"
    - cron: "0  17 * * 1-5"
    - cron: "15 17 * * 1-5"
    - cron: "30 17 * * 1-5"
    - cron: "45 17 * * 1-5"
    - cron: "0  18 * * 1-5"
    - cron: "15 18 * * 1-5"
    - cron: "30 18 * * 1-5"
    - cron: "45 18 * * 1-5"
    - cron: "0  19 * * 1-5"
    - cron: "15 19 * * 1-5"
    - cron: "30 19 * * 1-5"
    # Cron stops at 3:15 PM ET (19:15 UTC); bot's close buffer stops at 3:30 PM ET

  # ── Manual trigger ─────────────────────────────────────────────────────────
  # PAPER flow: set mode=paper, enter capital_limit, leave live_confirm blank
  # LIVE flow:  set mode=live, type "confirm" in live_confirm, enter capital_limit
  workflow_dispatch:
    inputs:
      mode:
        description: 'Trading mode'
        required: true
        default: 'paper'
        type: choice
        options:
          - paper
          - live
      capital_limit:
        description: 'Capital to use (USD) — required for both paper and live'
        required: true
        default: '1000'
      live_confirm:
        description: 'LIVE mode only — type exactly: confirm'
        required: false
        default: ''

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8     # hard kill if something hangs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        env:
          # Mode — 'paper' or 'live' from input; scheduled runs always paper
          PAPER_MODE: ${{ github.event.inputs.mode == 'live' && 'false' || 'true' }}

          # Capital limit — required for both modes
          CAPITAL_LIMIT: ${{ github.event.inputs.capital_limit || '0' }}

          # Live confirmation — must be typed as 'confirm' to enable live trading
          LIVE_CONFIRM: ${{ github.event.inputs.live_confirm || '' }}

          # Paper keys
          ALPACA_PAPER_API_KEY:    ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}

          # Live keys (add to Secrets when ready to go live)
          ALPACA_LIVE_API_KEY:     ${{ secrets.ALPACA_LIVE_API_KEY }}
          ALPACA_LIVE_API_SECRET:  ${{ secrets.ALPACA_LIVE_API_SECRET }}

          # Run ID for trade record traceability
          GITHUB_RUN_ID: ${{ github.run_id }}

        run: python vwap_ema_rsi_bot.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-log-${{ github.run_id }}
          path: |
            strategy_log.txt
            trade_records.json
          retention-days: 30
          if-no-files-found: ignore
