name: VWAP EMA RSI Trading Bot

on:
  schedule:
    # Runs every 15 min, Mon–Fri, 9:30 AM – 4:00 PM ET
    # GitHub Actions uses UTC — ET is UTC-4 in summer, UTC-5 in winter
    # Summer (EDT): market = 13:30–20:00 UTC
    - cron: "30 13 * * 1-5"
    - cron: "45 13 * * 1-5"
    - cron: "0  14 * * 1-5"
    - cron: "15 14 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "45 14 * * 1-5"
    - cron: "0  15 * * 1-5"
    - cron: "15 15 * * 1-5"
    - cron: "30 15 * * 1-5"
    - cron: "45 15 * * 1-5"
    - cron: "0  16 * * 1-5"
    - cron: "15 16 * * 1-5"
    - cron: "30 16 * * 1-5"
    - cron: "45 16 * * 1-5"
    - cron: "0  17 * * 1-5"
    - cron: "15 17 * * 1-5"
    - cron: "30 17 * * 1-5"
    - cron: "45 17 * * 1-5"
    - cron: "0  18 * * 1-5"
    - cron: "15 18 * * 1-5"
    - cron: "30 18 * * 1-5"
    - cron: "45 18 * * 1-5"
    - cron: "0  19 * * 1-5"
    - cron: "15 19 * * 1-5"
    - cron: "30 19 * * 1-5"
    # Stop 30 min before close (19:30 UTC = 3:30 PM ET)
    # Bot's own timing guard will also prevent close-time trades

  # Allow manual trigger anytime (for testing)
  workflow_dispatch:
    inputs:
      paper_mode:
        description: 'Run in paper mode?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # Kill if something hangs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"           # Caches pip installs — speeds up runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        env:
          ALPACA_PAPER_API_KEY:    ${{ secrets.ALPACA_PAPER_API_KEY }}
          ALPACA_PAPER_API_SECRET: ${{ secrets.ALPACA_PAPER_API_SECRET }}
          ALPACA_LIVE_API_KEY:     ${{ secrets.ALPACA_LIVE_API_KEY }}
          ALPACA_LIVE_API_SECRET:  ${{ secrets.ALPACA_LIVE_API_SECRET }}
          PAPER_MODE:        ${{ github.event.inputs.paper_mode || 'true' }}
        run: python vwap_ema_rsi_bot.py

      - name: Upload log as artifact
        if: always()            # Upload log even if bot errors
        uses: actions/upload-artifact@v4
        with:
          name: trade-log-${{ github.run_id }}
          path: strategy_log.txt
          retention-days: 30
